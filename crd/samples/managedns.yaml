---
# Operations team - using defaults (quota defaults to 4 CPU, 8Gi)
apiVersion: platform.ialexeze.io/v1alpha1
kind: ManagedNamespace
metadata:
  name: ops-team-ns
spec:
  team: "operations-team"
  # quota omitted - will use default from CRD
