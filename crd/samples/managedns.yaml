  team: "security-team"
  quota:
    cpu: "4"
    memory: "8Gi"
  networkPolicy: false  # Testing without network policy
---
# Invalid test - team name too short (should fail validation)
apiVersion: platform.ialexeze.io/v1alpha1
kind: ManagedNamespace
metadata:
  name: invalid-team-ns
spec:
