# Basic team namespace with standard quota
apiVersion: platform.ialexeze.io/v1alpha1
kind: ManagedNamespace
metadata:
  name: platform-team-ns
spec:
  team: "platform-team"
  quota:
    cpu: "4"
    memory: "8Gi"
  networkPolicy: true
---
# Development team with smaller quota
apiVersion: platform.ialexeze.io/v1alpha1
kind: ManagedNamespace
metadata:
  name: dev-team-ns
spec:
  team: "development-team"
  quota:
    cpu: "2"
    memory: "4Gi"
  networkPolicy: true
---
# QA team with medium quota
apiVersion: platform.ialexeze.io/v1alpha1
kind: ManagedNamespace
metadata:
  name: qa-team-ns
spec:
  team: "qa-team"
  quota:
    cpu: "4"
    memory: "8Gi"
  networkPolicy: true
---
# Testing team with minimal quota
apiVersion: platform.ialexeze.io/v1alpha1
kind: ManagedNamespace
metadata:
  name: test-team-ns
spec:
  team: "test-team"
  quota:
    cpu: "1"
    memory: "2Gi"
  networkPolicy: false  # Testing without network policy
---
# Marketing team with custom quota
apiVersion: platform.ialexeze.io/v1alpha1
