# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-crd-controller
  namespace: ops-team-ns
spec:
  replicas: 2  # High availability
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Ensure at least one pod is always running
  selector:
    matchLabels:
      app: multi-crd-controller
  template:
    metadata:
      labels:
        app: multi-crd-controller
    spec:
      terminationGracePeriodSeconds: 30  # Give time to release lease
      serviceAccountName: multi-crd-controller
      containers:
      - name: controller
        resources: {}
        image: ialexeze/multi-crd-controller:1.0.0
        imagePullPolicy: "Always"
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]  # Extra time for cleanup
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NAMESPACE
          value: "ops-team-ns"
        - name: WORKERS
          value: "5"
        - name: APP_ENV
          value: "staging"
        - name: LEASE_DURATION
          value: "60"
        - name: RENEW_DEADLINE
          value: "40"
        - name: RETRY_PERIOD
          value: "10"
        - name: PORT
          value: "5000"
