apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-ialexeze.com/version: v0.20.1
  name: projects.crd-example.ialexeze.ai
spec:
  group: crd-example.ialexeze.ai
  names:
    kind: Project
    listKind: ProjectList
    plural: projects
    singular: project
    shortNames:
    - proj
    - pr
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.replicas
      name: Replicas
      type: integer
    - jsonPath: .status.availableReplicas
      name: Available
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Project is the Schema for the projects API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value.
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              In CamelCase.
            type: string
          metadata:
            type: object
          spec:
            description: ProjectSpec defines the desired state of Project
            properties:
              replicas:
                description: Number of desired replicas. Minimum is 1.
                type: integer
                minimum: 1
              # Optional: Add more fields as needed
              # image:
              #   type: string
              # configMap:
              #   type: string
            required:
            - replicas
            type: object
          status:
            description: ProjectStatus defines the observed state of Project
            properties:
              availableReplicas:
                description: Number of available replicas
                type: integer
              conditions:
                description: Standard condition array for status details
                items:
                  description: "Condition contains details for one aspect of the current state of this API Resource."
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: 'Phase indicates the current lifecycle phase: Pending, Running, Failed, etc.'
                type: string
              replicas:
                description: Current number of replicas
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}